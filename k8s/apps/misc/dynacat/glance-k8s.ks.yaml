apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: glance-k8s
spec:
  interval: 10m
  prune: true
  wait: true

  path: ./k8s/apps/misc/dynacat/glance-k8s
  targetNamespace: homepage
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  dependsOn:
    - name: infra
      namespace: flux-system
