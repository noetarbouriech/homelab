apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: piraeus
spec:
  interval: 10m
  prune: true
  wait: true

  path: ./k8s/infra/storage/piraeus/app
  targetNamespace: piraeus-datastore
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
