apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoriametrics
spec:
  interval: 10m
  prune: true
  wait: true

  path: ./k8s/infra/observability/victoriametrics/app
  targetNamespace: observability
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  dependsOn:
    - name: piraeus
      namespace: piraeus-datastore
