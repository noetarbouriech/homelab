apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: grafana
spec:
  interval: 15m
  ref:
    tag: 11.6.0
  url: oci://ghcr.io/grafana-community/helm-charts/grafana
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: extract
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
spec:
  chartRef:
    kind: OCIRepository
    name: grafana
  interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    installCRDs: true
    plugins:
      - victoriametrics-logs-datasource

    route:
      main:
        enabled: true
        hostnames:
          - grafana.home.noe-t.dev
        parentRefs:
          - name: cilium-gateway
            namespace: kube-system

    sidecar:
      datasources:
        enabled: true
        searchNamespace: ALL
      dashboards:
        enabled: true
        searchNamespace: ALL
