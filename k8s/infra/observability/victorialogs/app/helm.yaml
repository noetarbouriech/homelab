apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-logs-single
spec:
  interval: 15m
  ref:
    tag: 0.11.31
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-logs-single
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-single
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs-single
  interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    nameOverride: victoria-logs
    installCRDs: true

    dashboards:
      enabled: true

    server:
      retentionPeriod: "30d"
      persistentVolume:
        enabled: true
        storageClassName: piraeus-replicated
        accessModes: ["ReadWriteOnce"]
        size: 40Gi
