apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victorialogs-collector
spec:
  interval: 10m
  prune: true
  wait: true

  path: ./k8s/infra/observability/victorialogs/collector
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  dependsOn:
    - name: victorialogs
