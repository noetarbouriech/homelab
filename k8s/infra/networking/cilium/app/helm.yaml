apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cilium
spec:
  interval: 1h
  url: https://helm.cilium.io/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 15m
  releaseName: cilium
  chart:
    spec:
      chart: cilium
      version: 1.18.1
      sourceRef:
        kind: HelmRepository
        name: cilium
  values:
    cluster:
      name: homelab-cluster

    k8sServiceHost: 10.40.0.11
    k8sServicePort: 6443

    kubeProxyReplacement: true

    ipam:
      mode: kubernetes

    routingMode: tunnel
    tunnelProtocol: vxlan

    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup

    hubble:
      relay:
        enabled: true
      ui:
        enabled: true

    gatewayAPI:
      enabled: true
      enableAlpn: true
      enableAppProtocol: true

    l2announcements:
      enabled: true

    operator:
      replicas: 1

    k8sClientRateLimit:
      qps: 50
      burst: 100

    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
