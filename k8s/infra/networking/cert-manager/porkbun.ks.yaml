apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: porkbun-webhook
spec:
  interval: 10m
  prune: true
  wait: true

  path: ./k8s/infra/networking/cert-manager/porkbun-webhook
  targetNamespace: cert-manager
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  dependsOn:
    - name: bitwarden-secretsmanager
      namespace: external-secrets
    - name: cert-manager
