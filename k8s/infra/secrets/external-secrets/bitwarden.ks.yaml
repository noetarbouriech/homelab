apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bitwarden-secretsmanager
spec:
  interval: 10m
  prune: true
  wait: true

  path: ./k8s/infra/secrets/external-secrets/bitwarden
  targetNamespace: external-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  dependsOn:
    - name: external-secrets-operator
