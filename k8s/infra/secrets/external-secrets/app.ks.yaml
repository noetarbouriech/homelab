apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-operator
spec:
  interval: 10m
  prune: true
  wait: true

  path: ./k8s/infra/secrets/external-secrets/app
  targetNamespace: external-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
